<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- CSS externo principal del sitio -->
    <link rel="stylesheet" href="css/styles.css">
    <title>Rose Glow | Haz florecer tu estilo</title>
</head>

<body>
    <!-- Encabezado principal fijo del sitio -->
    <header class="site-header">
        <div class="container header-content">
            <div class="logo-container">
                <img src="images/logo horizontal.png" alt="Logo Rose Glow" class="logo">
            </div>

            <!-- *** Checkbox oculto para controlar el menú hamburguesa sin JavaScript -->
            <input type="checkbox" id="menu-toggle" class="menu-toggle">

            <!-- *** Botón visual del menú hamburguesa -->
            <label for="menu-toggle" class="menu-button">
                <span></span>
                <span></span>
                <span></span>
            </label>
            <!-- Navegación principal -->
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="#servicios">Servicios</a></li>
                    <li><a href="#contacto">Contacto</a></li>
                </ul>
            </nav>
            <a href="agendar.html" class="btn-agendar">Agendar Cita</a>
        </div>
    </header>
    <main>
        <section id="inicio" class="hero">
            <div class="container hero-content">
                <div class="hero-carrusel">
                    <img id="imagenCarrusel" src="images/hero1.jpg" alt="Imagen de carrusel">
                </div>
                <div class="hero-text">
                    <h1 id="tituloHero"></h1>
                    <p id="textoHero1"></p>
                    <p id="textoHero2"></p>
                </div>
            </div>
        </section>

        <hr>

        <section id="servicios" class="events-section">
            <div class="container">
                <h2>Nuestros Servicios</h2>

                <div class="filters-panel">
                    <div class="filter-group">
                        <label for="filtroCategoria">Categoria</label>
                        <select id="filtroCategoria">
                            <option value="">Todas las categorias</option>
                        </select>
                    </div>
                    <div class="filter-group">
                                                <label for="busquedaServicio">Buscar servicio</label>
                        <input type="text" id="busquedaServicio" placeholder="Digite una palabra">
                    </div>
                    <button id="btnLimpiarFiltros" class="btn-clear">
                        Limpiar filtros
                    </button>
                </div>

                <p id="mensajeServicios" class="services-message">
                    Cargando eventos disponibles...
                </p>

                <div class="servicios-grid" id="serviciosGrid"></div>
            </div>
        </section>

    </main>

    <!-- Pie de página -->
    <footer id="contacto">
        <div class="footer-container">
            <div class="footer-info">
                <h3>Contacto</h3>
                <address>
                    Telefono: +506 3575 9578 <br>
                    Correo: info.roseglow@gmail.com <br>
                    Lunes a Sábado de 9:00 a.m. a 6:00 p.m. <br>
                    Alajuela, Costa Rica
                </address>
            </div>

            <div class="footer-map">
                <iframe src="https://www.google.com/maps?q=Alajuela,Costa%20Rica&output=embed" width="350" height="250"
                    loading="lazy" title="Mapa de Rose Glow">
                </iframe>
            </div>
        </div>
        <p>
            <small>&copy; 2026 Rose Glow. Todos los derechos reservados.</small>
        </p>
    </footer>
    <script src="js/jsonLoader.js"></script>
    <script src="js/servicios.js"></script>
    <script src="js/hero.js"></script>
</body>

</html>
